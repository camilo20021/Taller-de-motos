<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesion - Motos JL Racing</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-fondo">
<div class="auth-tarjeta">
<div class="marca">Motos <span>JL Racing</span></div>
<h1>Iniciar sesion</h1>
<p class="subtexto">Ingresa con tu correo y contrasena.</p>

<form onsubmit="event.preventDefault(); alert('Vista de demostracion. Para iniciar sesion de verdad ejecuta el servidor con python run.py');">
<div class="campo">
<label for="correo">Correo</label>
<input type="email" id="correo" name="correo" required autofocus>
</div>
<div class="campo">
<label for="password">Contrasena</label>
<input type="password" id="password" name="password" required>
</div>
<button type="submit" class="btn btn-primario" style="width:100%; justify-content:center;">Entrar</button>
</form>

<p class="auth-pie">Olvidaste tu contrasena? Pidele al administrador que te cree una nueva cuenta o la restablezca.</p>
</div>
</div>
</body>
</html>
